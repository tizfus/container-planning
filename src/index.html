<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Planning</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        .total-volume {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .total-volume h2 {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .total-volume .value {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .total-volume .unit {
            font-size: 1rem;
            opacity: 0.85;
            margin-left: 0.25rem;
        }

        .form-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .dimension-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }

        .dimension-input::-webkit-outer-spin-button,
        .dimension-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .dimension-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
    </style>
</head>
<body>
    <h1>Volume Calculator</h1>

    <div class="total-volume">
        <h2>Total Volume</h2>
        <span class="value" id="totalVolume" data-testid="totalVolume">0</span>
        <span class="unit">m³</span>
    </div>

    <div class="form-container">
        <div class="form-group">
            <label for="length">Length (cm)</label>
            <input type="number" id="length" class="dimension-input" data-testid="length" step="1" min="0" placeholder="0" inputmode="numeric">
        </div>
        <div class="form-group">
            <label for="width">Width (cm)</label>
            <input type="number" id="width" class="dimension-input" data-testid="width" step="1" min="0" placeholder="0" inputmode="numeric">
        </div>
        <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" class="dimension-input" data-testid="height" step="1" min="0" placeholder="0" inputmode="numeric">
        </div>
    </div>

    <script>
        function truncateDecimal(value) {
            const num = parseFloat(value);
            if (isNaN(num)) return '0';
            return Math.trunc(num).toString();
        }

        function updateTotalVolume() {
            const lengthInput = document.getElementById('length');
            const widthInput = document.getElementById('width');
            const heightInput = document.getElementById('height');

            // Truncate decimal values
            const length = parseInt(truncateDecimal(lengthInput.value)) || 0;
            const width = parseInt(truncateDecimal(widthInput.value)) || 0;
            const height = parseInt(truncateDecimal(heightInput.value)) || 0;

            // Update input values to truncated integers
            lengthInput.value = length;
            widthInput.value = width;
            heightInput.value = height;

            // Convert cm to meters, then calculate volume in m³
            const volume = (length / 100) * (width / 100) * (height / 100);
            document.getElementById('totalVolume').textContent = Math.round(volume);
        }

        document.getElementById('length').addEventListener('input', updateTotalVolume);
        document.getElementById('width').addEventListener('input', updateTotalVolume);
        document.getElementById('height').addEventListener('input', updateTotalVolume);
    </script>
</body>
</html>
