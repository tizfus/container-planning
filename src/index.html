<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Planning</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        .total-volume {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .total-volume h2 {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .total-volume .value {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .total-volume .unit {
            font-size: 1rem;
            opacity: 0.85;
            margin-left: 0.25rem;
        }

        .form-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .dimension-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }

        .dimension-input::-webkit-outer-spin-button,
        .dimension-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .dimension-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .products-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 0.5rem;
            padding: 0 0.25rem;
        }

        .products-header span {
            font-weight: 500;
            color: #555;
            font-size: 0.9rem;
        }

        .product-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <h1>Volume Calculator</h1>

    <div class="total-volume">
        <h2>Total Volume</h2>
        <span class="value" id="totalVolume" data-testid="totalVolume">0</span>
        <span class="unit">m³</span>
    </div>

    <div class="form-container">
        <div class="products-header">
            <span>Length (cm)</span>
            <span>Width (cm)</span>
            <span>Height (cm)</span>
        </div>
        <div id="products-container"></div>
    </div>

    <script>
        function createProductRow() {
            const row = document.createElement('div');
            row.className = 'product-row';
            row.setAttribute('data-testid', 'product-size');

            ['length', 'width', 'height'].forEach(function(dim) {
                const input = document.createElement('input');
                input.type = 'number';
                input.className = 'dimension-input';
                input.setAttribute('data-testid', dim);
                input.step = '1';
                input.min = '0';
                input.placeholder = '0';
                input.setAttribute('inputmode', 'numeric');
                input.addEventListener('input', onInput);
                row.appendChild(input);
            });

            return row;
        }

        function onInput(event) {
            const input = event.target;
            if (input.value !== '') {
                const truncated = Math.trunc(parseFloat(input.value));
                input.value = isNaN(truncated) ? '' : truncated;
            }
            updateAll();
        }

        function getRowVolume(row) {
            const length = parseInt(row.querySelector('[data-testid="length"]').value) || 0;
            const width = parseInt(row.querySelector('[data-testid="width"]').value) || 0;
            const height = parseInt(row.querySelector('[data-testid="height"]').value) || 0;
            return (length / 100) * (width / 100) * (height / 100);
        }

        function updateAll() {
            const container = document.getElementById('products-container');
            const rows = container.querySelectorAll('[data-testid="product-size"]');

            let totalVolume = 0;
            rows.forEach(function(row) {
                totalVolume += getRowVolume(row);
            });
            document.getElementById('totalVolume').textContent = Math.round(totalVolume);

            // Add a new empty row when all fields of the last row are filled
            const lastRow = rows[rows.length - 1];
            const lastLength = lastRow.querySelector('[data-testid="length"]').value;
            const lastWidth = lastRow.querySelector('[data-testid="width"]').value;
            const lastHeight = lastRow.querySelector('[data-testid="height"]').value;

            if (lastLength !== '' && lastWidth !== '' && lastHeight !== '') {
                container.appendChild(createProductRow());
            }
        }

        // Initialise with one empty row
        document.getElementById('products-container').appendChild(createProductRow());
    </script>
</body>
</html>
